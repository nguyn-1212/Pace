<div class="kt-portlet kt-portlet-edit-form">
    <edit-header *ngIf="breadcrumbs && actions?.length"
        [breadcrumbs]="breadcrumbs" [actions]="actions" [processing]="processing">
    </edit-header>
    <div class="kt-portlet__body">
        <div class="row" *ngIf="item && !loading">
            <div class="col-sm-12"><h5 class="form-section-title">📋 Thông tin chung</h5></div>
            <div class="col-sm-6"><editor [(object)]="item" property="TripId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="TripDayId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-8"><editor [(object)]="item" property="Title" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="Type" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-12"><editor [(object)]="item" property="Description" [decorator]="{readonly: viewer}"></editor></div>

            <div class="col-sm-12"><h5 class="form-section-title">🕐 Thời gian & Địa điểm</h5></div>
            <div class="col-sm-3"><editor [(object)]="item" property="StartTime" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="EndTime" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="ActivityStatus" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="OrderIndex" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="PlaceId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="Address" [decorator]="{readonly: viewer}"></editor></div>

            <div class="col-sm-12"><h5 class="form-section-title">💰 Chi phí</h5></div>
            <div class="col-sm-4"><editor [(object)]="item" property="EstCost" [decorator]="{readonly: viewer}"></editor></div>
        </div>
        <div class="row row-loading" *ngIf="loading"><loading></loading></div>
    </div>
</div>
