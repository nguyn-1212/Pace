<div class="kt-portlet kt-portlet-edit-form">
    <edit-header *ngIf="breadcrumbs && actions?.length"
        [breadcrumbs]="breadcrumbs" [actions]="actions" [processing]="processing">
    </edit-header>
    <div class="kt-portlet__body">
        <div class="row" *ngIf="item && !loading">
            <div class="col-sm-12"><h5 class="form-section-title">💳 Thông tin quyết toán</h5></div>
            <div class="col-sm-6"><editor [(object)]="item" property="TripId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="Status" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="FromUserId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="ToUserId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="Amount" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="PaidDate" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-12"><editor [(object)]="item" property="Note" [decorator]="{readonly: viewer}"></editor></div>
        </div>
        <div class="row row-loading" *ngIf="loading"><loading></loading></div>
    </div>
</div>
