<div class="kt-portlet kt-portlet-edit-form">
    <edit-header *ngIf="breadcrumbs && actions?.length"
        [breadcrumbs]="breadcrumbs" [actions]="actions" [processing]="processing">
    </edit-header>
    <div class="kt-portlet__body">
        <div class="row" *ngIf="item && !loading">
            <div class="col-sm-6"><editor [(object)]="item" property="PlaceId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="Date" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="TempHigh" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="TempLow" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="Humidity" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="WindSpeed" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="Condition" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="SeasonLabel" [decorator]="{readonly: viewer}"></editor></div>
        </div>
        <div class="row row-loading" *ngIf="loading"><loading></loading></div>
    </div>
</div>
