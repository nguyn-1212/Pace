<div class="kt-portlet kt-portlet-edit-form">
    <edit-header *ngIf="breadcrumbs && actions?.length" [breadcrumbs]="breadcrumbs" [actions]="actions" [processing]="processing"></edit-header>
    <div class="kt-portlet__body">
        <div class="row" *ngIf="item && !loading">
            <div class="col-sm-12"><h5 class="form-section-title">🔒 Cài đặt riêng tư</h5></div>
            <div class="col-sm-12"><editor [(object)]="item" property="UserId" [decorator]="{readonly: viewer}"></editor></div>

            <div class="col-sm-12"><h5 class="form-section-title">📍 Vị trí & Hiển thị</h5></div>
            <div class="col-sm-4"><editor [(object)]="item" property="ShareLocation" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="ShowOnlineStatus" [decorator]="{readonly: viewer}"></editor></div>

            <div class="col-sm-12"><h5 class="form-section-title">👥 Quyền truy cập</h5></div>
            <div class="col-sm-6"><editor [(object)]="item" property="WhoCanFind" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-6"><editor [(object)]="item" property="ShowTripHistory" [decorator]="{readonly: viewer}"></editor></div>
        </div>
        <div class="row row-loading" *ngIf="loading"><loading></loading></div>
    </div>
</div>
