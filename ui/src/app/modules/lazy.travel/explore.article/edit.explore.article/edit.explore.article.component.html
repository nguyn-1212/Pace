<div class="kt-portlet kt-portlet-edit-form">
    <edit-header *ngIf="breadcrumbs && actions?.length" [breadcrumbs]="breadcrumbs" [actions]="actions" [processing]="processing"></edit-header>
    <div class="kt-portlet__body">
        <div class="row" *ngIf="item && !loading">
            <div class="col-sm-12"><h5 class="form-section-title">📝 Thông tin bài viết</h5></div>
            <div class="col-sm-1"><editor [(object)]="item" property="CoverEmoji" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-7"><editor [(object)]="item" property="Title" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="Slug" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="ArticleCategory" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="PlaceId" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-4"><editor [(object)]="item" property="Author" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-12"><editor [(object)]="item" property="Summary" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-12"><editor [(object)]="item" property="Content" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-12"><h5 class="form-section-title">📅 Xuất bản</h5></div>
            <div class="col-sm-3"><editor [(object)]="item" property="IsPublished" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="PublishedDate" [decorator]="{readonly: viewer}"></editor></div>
            <div class="col-sm-3"><editor [(object)]="item" property="ViewCount" [decorator]="{readonly: viewer}"></editor></div>
        </div>
        <div class="row row-loading" *ngIf="loading"><loading></loading></div>
    </div>
</div>
