<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pace — Tạo Area</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,500;0,600;0,700;0,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ch:#BA541C;--wb:#2B0F04;--sp:#6A3C16;--rw:#FFF6ED;--cr:#F5EDE0;--mu:#C4A882;--gd:#4A7C59;--fh:'Plus Jakarta Sans',sans-serif;--fb:'Nunito',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--cr);min-height:100vh;display:flex;justify-content:center;padding:32px 16px 48px}
.phone{background:var(--wb);width:375px;border-radius:44px;overflow:hidden;border:1.5px solid rgba(186,84,28,.15);box-shadow:0 24px 60px rgba(43,15,4,.22);position:relative}
.sb{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;font-size:11px;font-weight:600;color:var(--sp)}
/* HEADER */
.hd{background:var(--wb);padding:14px 22px 40px;position:relative}

.hd-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{width:15px;height:15px;fill:none;stroke:rgba(255,246,237,.7);stroke-width:2.2;stroke-linecap:round}
.hd-title{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--rw)}

/* LIVE PREVIEW CARD */
.preview-card{margin:0 22px;border-radius:16px;padding:18px 18px 16px;transition:background .3s;position:relative;overflow:hidden;cursor:default;box-shadow:0 4px 16px rgba(43,15,4,.2)}
.preview-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.preview-emoji-lg{font-size:32px;margin-bottom:8px}
.preview-name{font-family:var(--fh);font-size:18px;font-weight:700;color:#fff;min-height:24px}
.preview-desc{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);margin-top:2px;min-height:16px}
.preview-bar-row{display:flex;align-items:center;gap:8px;margin-top:14px}
.preview-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.preview-bar-fill{height:4px;background:rgba(255,255,255,.7);border-radius:2px;width:0%}
.preview-count{font-size:11px;font-weight:700;color:rgba(255,255,255,.7)}

/* BODY */
.body{background:var(--rw);padding:32px 20px 110px;display:flex;flex-direction:column;gap:20px;border-radius:24px 24px 0 0;position:relative;z-index:2;box-shadow:0 -3px 16px rgba(43,15,4,.10);}
.field-group{display:flex;flex-direction:column;gap:0}
.field-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.inp{width:100%;border:1px solid rgba(186,84,28,.2);border-radius:12px;padding:13px 15px;font-family:var(--fh);font-size:16px;font-weight:600;color:var(--wb);background:var(--rw);outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--ch);box-shadow:0 0 0 3px rgba(186,84,28,.1)}
.inp::placeholder{color:var(--mu);font-weight:400;font-size:14px}

/* EMOJI GRID */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.eq{width:100%;aspect-ratio:1;border-radius:10px;background:var(--cr);border:1.5px solid rgba(186,84,28,.12);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .15s}
.eq:hover{border-color:rgba(186,84,28,.35);background:#EDE3D4}
.eq.sel{border-color:var(--ch);background:rgba(186,84,28,.1);box-shadow:0 0 0 1px var(--ch)}

/* COLOR SWATCHES */
.color-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.cswatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2.5px solid transparent}
.cswatch.sel{transform:scale(1.15)}

/* PRESET AREAS */
.preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.preset-row::-webkit-scrollbar{display:none}
.preset-pill{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1px solid rgba(186,84,28,.18);background:var(--rw);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--sp);flex-shrink:0}
.preset-pill:hover{border-color:var(--ch);color:var(--ch);background:rgba(186,84,28,.05)}

/* SAVE */
.save-btn{width:100%;padding:15px;border-radius:14px;background:var(--ch);color:#fff;border:none;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;box-shadow:0 3px 12px rgba(186,84,28,.3)}
.save-btn:disabled{opacity:.35;cursor:default}
.cancel-btn{width:100%;padding:12px;border:none;background:transparent;color:var(--mu);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="phone">
<div class="sb"><span>9:41</span><span style="font-weight:500">100%</span></div>

<div class="hd">
  <div class="hd-row">
    <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="hd-title">Tạo Area mới</div>
  </div>
</div>

<!-- LIVE PREVIEW -->
<div id="preview-card" class="preview-card" style="background:linear-gradient(135deg,#3C3489 0%,#534AB7 100%)">
  <div class="preview-emoji-lg" id="prev-emoji">📚</div>
  <div class="preview-name" id="prev-name">Tên Area...</div>
  <div class="preview-desc" id="prev-desc">Mô tả ngắn...</div>
  <div class="preview-bar-row">
    <div class="preview-bar"><div class="preview-bar-fill" id="prev-fill"></div></div>
    <div class="preview-count">0 goals</div>
  </div>
</div>

<div class="body">

  <!-- Preset gợi ý -->
  <div class="field-group">
    <div class="field-label">Chọn nhanh</div>
    <div class="preset-row">
      <div class="preset-pill" onclick="applyPreset('📚','Study','Học tập & kỹ năng','#534AB7')">📚 Study</div>
      <div class="preset-pill" onclick="applyPreset('💪','Health','Sức khoẻ & lối sống','#4A7C59')">💪 Health</div>
      <div class="preset-pill" onclick="applyPreset('🏋️','Gym','Tập luyện thể thao','#185FA5')">🏋️ Gym</div>
      <div class="preset-pill" onclick="applyPreset('💰','Tài chính','Tiền bạc & đầu tư','#BA541C')">💰 Tài chính</div>
      <div class="preset-pill" onclick="applyPreset('🌱','Personal','Phát triển bản thân','#7A1010')">🌱 Personal</div>
      <div class="preset-pill" onclick="applyPreset('💼','Công việc','Career & nghề nghiệp','#5C3317')">💼 Công việc</div>
    </div>
  </div>

  <!-- Tên -->
  <div class="field-group">
    <div class="field-label">Tên Area</div>
    <input class="inp" id="area-name" type="text" placeholder="VD: Du lịch, Sáng tạo, Gia đình..." maxlength="20" oninput="update()">
  </div>

  <!-- Mô tả -->
  <div class="field-group">
    <div class="field-label">Mô tả ngắn <span style="color:rgba(196,168,130,.6);font-size:9px;font-weight:600">(tuỳ chọn)</span></div>
    <input class="inp" id="area-desc" type="text" placeholder="VD: Những thứ liên quan đến du lịch" maxlength="40" oninput="update()">
  </div>

  <!-- Emoji -->
  <div class="field-group">
    <div class="field-label">Biểu tượng</div>
    <div class="emoji-grid">
      <div class="eq sel" onclick="pickEmoji(this,'📚')">📚</div>
      <div class="eq" onclick="pickEmoji(this,'💪')">💪</div>
      <div class="eq" onclick="pickEmoji(this,'🏋️')">🏋️</div>
      <div class="eq" onclick="pickEmoji(this,'💰')">💰</div>
      <div class="eq" onclick="pickEmoji(this,'🌱')">🌱</div>
      <div class="eq" onclick="pickEmoji(this,'💼')">💼</div>
      <div class="eq" onclick="pickEmoji(this,'🎯')">🎯</div>
      <div class="eq" onclick="pickEmoji(this,'✈️')">✈️</div>
      <div class="eq" onclick="pickEmoji(this,'🎨')">🎨</div>
      <div class="eq" onclick="pickEmoji(this,'🎸')">🎸</div>
      <div class="eq" onclick="pickEmoji(this,'🍳')">🍳</div>
      <div class="eq" onclick="pickEmoji(this,'🏠')">🏠</div>
      <div class="eq" onclick="pickEmoji(this,'❤️')">❤️</div>
      <div class="eq" onclick="pickEmoji(this,'⭐')">⭐</div>
      <div class="eq" onclick="pickEmoji(this,'🔥')">🔥</div>
      <div class="eq" onclick="pickEmoji(this,'✨')">✨</div>
    </div>
  </div>

  <!-- Màu -->
  <div class="field-group">
    <div class="field-label">Màu sắc</div>
    <div class="color-grid">
      <div class="cswatch sel" onclick="pickColor(this,'#534AB7','#3C3489')" style="background:#534AB7;box-shadow:0 0 0 2.5px #fff,0 0 0 5px #534AB7" title="Tím"></div>
      <div class="cswatch" onclick="pickColor(this,'#4A7C59','#085041')" style="background:#4A7C59" title="Xanh lá"></div>
      <div class="cswatch" onclick="pickColor(this,'#BA541C','#7A4000')" style="background:#BA541C" title="Chestnut"></div>
      <div class="cswatch" onclick="pickColor(this,'#185FA5','#0D3F70')" style="background:#185FA5" title="Xanh dương"></div>
      <div class="cswatch" onclick="pickColor(this,'#7A1010','#5A0A0A')" style="background:#7A1010" title="Đỏ"></div>
      <div class="cswatch" onclick="pickColor(this,'#5C3317','#3A1E0A')" style="background:#5C3317" title="Nâu"></div>
      <div class="cswatch" onclick="pickColor(this,'#2B6B6B','#1A4040')" style="background:#2B6B6B" title="Teal"></div>
    </div>
  </div>

  <button class="save-btn" id="save-btn" disabled onclick="save()">Tạo Area ✓</button>
  <button class="cancel-btn" onclick="history.back()">Huỷ</button>

</div>
</div><!-- /phone -->

<script>
var curEmoji='📚', curColor='#534AB7', curColorDark='#3C3489';

function update(){
  var n=document.getElementById('area-name').value.trim();
  var d=document.getElementById('area-desc').value.trim();
  document.getElementById('prev-name').textContent=n||'Tên Area...';
  document.getElementById('prev-desc').textContent=d||'Mô tả ngắn...';
  document.getElementById('save-btn').disabled=n.length===0;
  document.getElementById('save-btn').style.opacity=n.length===0?'.35':'1';
}
function pickEmoji(el,em){
  curEmoji=em;
  document.querySelectorAll('.eq').forEach(function(e){e.classList.remove('sel')});
  el.classList.add('sel');
  document.getElementById('prev-emoji').textContent=em;
}
function pickColor(el,c,cd){
  curColor=c; curColorDark=cd;
  document.querySelectorAll('.cswatch').forEach(function(e){
    e.classList.remove('sel');
    e.style.boxShadow='none';e.style.transform='scale(1)';
  });
  el.classList.add('sel');
  el.style.boxShadow='0 0 0 2.5px #fff,0 0 0 5px '+c;
  el.style.transform='scale(1.15)';
  document.getElementById('preview-card').style.background=
    'linear-gradient(135deg,'+cd+' 0%,'+c+' 100%)';
}
function applyPreset(emoji,name,desc,color){
  document.getElementById('area-name').value=name;
  document.getElementById('area-desc').value=desc;
  document.getElementById('prev-name').textContent=name;
  document.getElementById('prev-desc').textContent=desc;
  document.getElementById('prev-emoji').textContent=emoji;
  curEmoji=emoji;curColor=color;
  // find and select matching color swatch
  document.querySelectorAll('.cswatch').forEach(function(e){
    var t=e.getAttribute('title');
    if(e.style.background===color){e.click();}
  });
  document.getElementById('preview-card').style.background=
    'linear-gradient(135deg,'+color+'cc 0%,'+color+' 100%)';
  document.getElementById('save-btn').disabled=false;
  document.getElementById('save-btn').style.opacity='1';
}
function save(){
  // In real app: save to state then navigate
  alert('Area "'+document.getElementById('area-name').value+'" đã được tạo!');
  history.back();
}
</script>
</body>
</html>
